name: Build Release (Custom BEAM)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to publish the release under (optional for manual dispatch).'
        required: false
        default: ''
  push:
    branches: [main, master, test-custom-beam]
    tags: ['*']

env:
  MIX_ENV: prod
  OTP_VERSION: "28.3.1"
  OTP_SHORT: "28"
  ELIXIR_VERSION: "1.19.5"
  UBUNTU_VERSION: "22.04"
  ZIG_VERSION: "0.15.2"

jobs:
  build-server:
    name: Server Binary (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 使用自定义脚本安装 BEAM
      - name: Setup Custom BEAM
        run: |
          chmod +x .github/scripts/setup-beam.sh
          .github/scripts/setup-beam.sh

      # 缓存 Erlang/Elixir 安装
      - name: Cache BEAM
        uses: actions/cache@v4
        with:
          path: |
            ~/erlang_${{ env.OTP_SHORT }}
            ~/elixir_otp${{ env.OTP_SHORT }}
          key: beam-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}
          restore-keys: |
            beam-${{ runner.os }}-otp${{ env.OTP_VERSION }}-

      # 验证版本
      - name: Verify BEAM versions
        run: |
          erl -eval 'erlang:display(erlang:system_info(otp_release)), halt().' -noshell
          elixir --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 安装 Burrito 依赖
      - name: Install Burrito dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq
          # 安装 zig（从 index.json 解析）
          index="$(curl -fsSL https://ziglang.org/download/index.json)"
          zig_url="$(printf '%s' "$index" | jq -r ".\"${ZIG_VERSION}\".\"x86_64-linux\".tarball")"
          zig_pkg="$(basename "$zig_url")"
          wget -q "$zig_url"
          tar -xf "$zig_pkg"
          sudo mv "${zig_pkg%.tar.xz}" /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Install Hex/Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      # 缓存依赖
      - name: Cache Mix Dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-

      - name: Fetch Deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Build Assets
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build Server Binary (Burrito)
        run: mix release cortex --overwrite

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-server-linux-x86_64
          path: burrito_out/cortex_linux

  build-desktop:
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            burrito-target: linux
            sidecar-triple: x86_64-unknown-linux-gnu
            sidecar-ext: ""
            burrito-bin: cortex_linux
            use-custom-beam: true

          # Windows 和 macOS 暂时使用官方 action
          - label: Windows x86_64
            os: windows-2022
            rust-target: x86_64-pc-windows-msvc
            burrito-target: windows
            sidecar-triple: x86_64-pc-windows-msvc
            sidecar-ext: .exe
            burrito-bin: cortex_windows.exe
            use-custom-beam: false

          - label: macOS aarch64
            os: macos-14
            rust-target: aarch64-apple-darwin
            burrito-target: macos_m1
            sidecar-triple: aarch64-apple-darwin
            sidecar-ext: ""
            burrito-bin: cortex_macos_m1
            use-custom-beam: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux: 使用自定义 BEAM
      - name: Setup Custom BEAM (Linux)
        if: matrix.use-custom-beam
        run: |
          chmod +x .github/scripts/setup-beam.sh
          .github/scripts/setup-beam.sh

      - name: Cache BEAM (Linux)
        if: matrix.use-custom-beam
        uses: actions/cache@v4
        with:
          path: |
            ~/erlang_${{ env.OTP_SHORT }}
            ~/elixir_otp${{ env.OTP_SHORT }}
          key: beam-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}

      # Windows/macOS: 使用官方 action
      - name: Setup BEAM (Official)
        if: ${{ !matrix.use-custom-beam }}
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
        env:
          ImageOS: ${{ runner.os == 'Windows' && 'win22' || (runner.os == 'macOS' && 'macos14' || '') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Rust 缓存（重要优化）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-directories: |
            ~/.cargo/bin
          key: ${{ matrix.rust-target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xz-utils jq
          # 安装 zig（Burrito 依赖，从 index.json 解析）
          index="$(curl -fsSL https://ziglang.org/download/index.json)"
          zig_url="$(printf '%s' "$index" | jq -r ".\"${ZIG_VERSION}\".\"x86_64-linux\".tarball")"
          zig_pkg="$(basename "$zig_url")"
          wget -q "$zig_url"
          tar -xf "$zig_pkg"
          sudo mv "${zig_pkg%.tar.xz}" /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Install Hex/Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      # 安装 Burrito 依赖（跨平台）
      - name: Install Burrito dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 安装 zig（从 index.json 解析）
          $index = Invoke-WebRequest -Uri "https://ziglang.org/download/index.json" | Select-Object -ExpandProperty Content | ConvertFrom-Json
          $zigUrl = $index.$env:ZIG_VERSION.'x86_64-windows'.tarball
          $zigPkg = Split-Path $zigUrl -Leaf
          Invoke-WebRequest -Uri $zigUrl -OutFile $zigPkg
          Expand-Archive -Path $zigPkg -DestinationPath "C:\"
          $zigDir = $zigPkg -replace '\.zip$',''
          echo "C:\$zigDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # xz 已经预装在 Windows runner

      - name: Install Burrito dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install xz jq
          arch="$(uname -m)"
          if [ "$arch" = "arm64" ] || [ "$arch" = "aarch64" ]; then
            zig_arch="aarch64-macos"
          else
            zig_arch="x86_64-macos"
          fi
          index="$(curl -fsSL https://ziglang.org/download/index.json)"
          zig_url="$(printf '%s' "$index" | jq -r ".[\"${ZIG_VERSION}\"].\"${zig_arch}\".tarball")"
          zig_pkg="$(basename "$zig_url")"
          curl -fsSL "$zig_url" -o "${zig_pkg}"
          tar -xf "${zig_pkg}"
          sudo mv "${zig_pkg%.tar.xz}" /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Cache Mix Dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}

      - name: Fetch Deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Build Assets
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build Backend Sidecar (Burrito)
        run: mix release cortex --overwrite

      - name: Place sidecar binary for Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "burrito_out/${{ matrix.burrito-bin }}" \
             "src-tauri/binaries/cortex_backend-${{ matrix.sidecar-triple }}${{ matrix.sidecar-ext }}"
          ls -la src-tauri/binaries/

      - name: Install Tauri CLI
        shell: bash
        run: |
          # 只在未缓存时安装
          if ! command -v cargo-tauri &> /dev/null; then
            cargo install tauri-cli --version "^2" --locked
          else
            echo "cargo-tauri already installed: $(cargo-tauri --version)"
          fi

      - name: Build Tauri Desktop App
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.rust-target }}

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-desktop-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**

  publish-release:
    name: Publish GitHub Release
    needs: [build-server, build-desktop]
    runs-on: ubuntu-22.04
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}
    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: cortex-server-linux-x86_64
          path: release-artifacts

      - name: Download Linux desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: 'cortex-desktop-Linux x86_64'
          path: release-artifacts

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: 'cortex-desktop-Windows x86_64'
          path: release-artifacts

      - name: Download macOS desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: 'cortex-desktop-macOS aarch64'
          path: release-artifacts

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          tar -czf release-assets/cortex-server-linux-x86_64.tar.gz \
            -C release-artifacts/cortex-server-linux-x86_64 burrito_out/cortex_linux
          tar -czf release-assets/cortex-desktop-linux-x86_64.tar.gz \
            -C "release-artifacts/cortex-desktop-Linux x86_64" .
          tar -czf release-assets/cortex-desktop-windows-x86_64.tar.gz \
            -C "release-artifacts/cortex-desktop-Windows x86_64" .
          tar -czf release-assets/cortex-desktop-macos-aarch64.tar.gz \
            -C "release-artifacts/cortex-desktop-macOS aarch64" .

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            Artifacts built by the custom BEAM workflow.
          files: |
            release-assets/cortex-server-linux-x86_64.tar.gz
            release-assets/cortex-desktop-linux-x86_64.tar.gz
            release-assets/cortex-desktop-windows-x86_64.tar.gz
            release-assets/cortex-desktop-macos-aarch64.tar.gz
